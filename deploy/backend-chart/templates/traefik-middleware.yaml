---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "climbing-gym-model-backend.fullname" . }}-minio-stripprefix
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "climbing-gym-model-backend.name" . }}
    helm.sh/chart: {{ include "climbing-gym-model-backend.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  stripPrefix:
    prefixes:
      - /minio
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "climbing-gym-model-backend.fullname" . }}-limit-body-size
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "climbing-gym-model-backend.name" . }}
    helm.sh/chart: {{ include "climbing-gym-model-backend.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  buffering:
    maxRequestBodyBytes: 10485760  # 10MB
